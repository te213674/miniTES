<!DOCTYPE html>
<html lang="ru">
<!-- GitHub API токен должен быть установлен здесь -->
<!-- Замените YOUR_GITHUB_TOKEN на реальный токен -->
<html lang="ru" data-api-token="YOUR_GITHUB_TOKEN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | миниТЭЦ - Энергосервисные контракты</title>
    <meta name="description" content="Свяжитесь с нами для получения коммерческого предложения по энергосервисному контракту. miniTES - газопоршневые установки, экономия до 30%">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-blue-600">миниТЭЦ</a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600">Калькулятор</a>
                    <a href="#about" class="text-gray-700 hover:text-blue-600">О нас</a>
                    <a href="#contact" class="text-gray-700 hover:text-blue-600">Контакты</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Контакты</h1>
            <p class="text-gray-600">Оставьте заявку на коммерческое предложение или анализ газа</p>
        </header>

        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8">
            <form id="contactForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Имя *</label>
                        <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Телефон *</label>
                        <input type="tel" name="phone" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Компания</label>
                    <input type="text" name="company" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Сообщение</label>
                    <textarea name="message" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">
                    Отправить заявку
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center">
                <p class="text-gray-400">Email: info@minites.ru</p>
                <p class="text-gray-400 mt-2">&copy; 2026 миниТЭЦ. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="js/github-forms.js"></script>
</body>
</html>
