<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta -->
    <title>Страница не найдена | miniTES</title>
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-content {
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .error-text {
            color: var(--color-text-light);
            margin-bottom: 2rem;
        }
        .error-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div class="error-page">
    <div class="error-content fade-in">
        <div class="error-code">404</div>
        <h1 class="error-title">Страница не найдена</h1>
        <p class="error-text">
            Похоже, вы попали на страницу, которой не существует. 
            Возможно, она была перемещена или удалена.
        </p>
        <div class="error-links">
            <a href="index.html" class="btn btn-primary">На главную</a>
            <a href="uslugi.html" class="btn btn-secondary">Услуги</a>
            <a href="contact.html" class="btn btn-outline">Связаться с нами</a>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
